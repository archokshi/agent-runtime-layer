name: Bug report
description: Report something broken in Agent Runtime Layer
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How do we reproduce it?
      description: Include commands, trace files, or UI steps.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Docker version, Node version, Python version
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before sharing.

