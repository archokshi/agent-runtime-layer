name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Agent Runtime Layer do?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Link traces, screenshots, tools, or workflows if useful.

