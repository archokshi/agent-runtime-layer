name: Build & Push Multi-Platform Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'customer-dashboard-v3/**'
      - '.github/workflows/docker-build.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (enables arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: archokshi/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push dashboard (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./customer-dashboard-v3
          platforms: linux/amd64,linux/arm64
          push: true
          tags: archokshi/dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
