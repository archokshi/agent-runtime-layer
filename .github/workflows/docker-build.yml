name: Build & Push Multi-Platform Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'customer-dashboard-v3/**'
      - '.github/workflows/docker-build.yml'

# Cancel any in-progress build when a new commit arrives
concurrency:
  group: docker-build
  cancel-in-progress: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: archokshi/backend:latest
          cache-from: type=registry,ref=archokshi/backend:buildcache
          cache-to: type=registry,ref=archokshi/backend:buildcache,mode=max

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push dashboard (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./customer-dashboard-v3
          platforms: linux/amd64,linux/arm64
          push: true
          tags: archokshi/dashboard:latest
          cache-from: type=registry,ref=archokshi/dashboard:buildcache
          cache-to: type=registry,ref=archokshi/dashboard:buildcache,mode=max
