# Agentium — Customer Docker Compose
# This file is downloaded automatically by the installer.
# Do not edit unless you know what you're doing.

services:
  backend:
    image: archokshi/backend:latest
    ports:
      - "8000:8000"
    volumes:
      - agentium_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  dashboard:
    image: archokshi/dashboard:latest
    ports:
      - "4001:4001"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      INTERNAL_API_BASE_URL: http://backend:8000/api
      PORT: "4001"
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    image: archokshi/backend:latest
    command: python -m agent_runtime_layer.cli proxy --port 8100 --base-url http://backend:8000/api
    ports:
      - "8100:8100"
    environment:
      AGENTIUM_API_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  agentium_data:
