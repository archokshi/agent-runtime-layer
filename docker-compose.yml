services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      INTERNAL_API_BASE_URL: http://backend:8000/api
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  customer-dashboard:
    build:
      context: ./customer-dashboard
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      INTERNAL_API_BASE_URL: http://backend:8000/api
      PORT: 4000
      HOSTNAME: "0.0.0.0"
    ports:
      - "4000:4000"
    depends_on:
      backend:
        condition: service_healthy

  customer-dashboard-v3:
    build:
      context: ./customer-dashboard-v3
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      INTERNAL_API_BASE_URL: http://backend:8000/api
      PORT: 4001
      HOSTNAME: "0.0.0.0"
    ports:
      - "4001:4001"
    depends_on:
      backend:
        condition: service_healthy
