[project]
name = "agentium-tracer"
version = "0.1.3"
description = "Python SDK for Agent Runtime Layer traces"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-or-later" }

[project.scripts]
agent-runtime = "agent_runtime_layer.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
